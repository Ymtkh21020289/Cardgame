<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カードバトルゲーム</title>
<style>
  /* ===== カラーテーマ ===== */
  :root {
    --bg-deep: #0a0714;
    --bg-mid: #1a1030;
    --bg-glow: #2a1b4d;
    --gold: #f5c542;
    --gold-soft: #ffe08a;
    --ink: #ede8ff;
    --ink-dim: #b3a9d9;
    --panel: rgba(30, 20, 55, 0.55);
    --panel-border: rgba(180, 150, 255, 0.22);
    --shadow: 0 12px 40px rgba(0, 0, 0, 0.55);
  }

  /* ===== 全体のベース設定 ===== */
  * { box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    background:
      radial-gradient(circle at 20% 15%, rgba(120, 70, 220, 0.28), transparent 45%),
      radial-gradient(circle at 82% 80%, rgba(230, 120, 80, 0.18), transparent 42%),
      radial-gradient(circle at 50% 50%, var(--bg-glow), var(--bg-mid) 55%, var(--bg-deep) 100%);
    background-attachment: fixed;
    color: var(--ink);
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
    text-align: center;
    margin: 0;
    min-height: 100vh;
    letter-spacing: 0.02em;
  }

  /* 星屑の装飾 */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      radial-gradient(1px 1px at 12% 22%, rgba(255,255,255,0.7), transparent),
      radial-gradient(1px 1px at 68% 12%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1.5px 1.5px at 40% 70%, rgba(255,255,255,0.6), transparent),
      radial-gradient(1px 1px at 88% 55%, rgba(255,255,255,0.45), transparent),
      radial-gradient(1px 1px at 25% 88%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1.5px 1.5px at 78% 82%, rgba(255,255,255,0.4), transparent);
    opacity: 0.7;
    animation: twinkle 6s ease-in-out infinite alternate;
    z-index: 0;
  }
  @keyframes twinkle { from { opacity: 0.35; } to { opacity: 0.8; } }

  h2, h3 {
    margin: 0 0 14px;
    font-weight: 800;
    letter-spacing: 0.08em;
  }
  h2 {
    font-size: 30px;
    background: linear-gradient(180deg, var(--gold-soft), var(--gold) 60%, #c9962a);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 2px 8px rgba(245, 197, 66, 0.35));
  }
  h3 {
    font-size: 18px;
    color: var(--ink);
    text-shadow: 0 2px 6px rgba(0, 0, 0, 0.5);
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  h3::before, h3::after {
    content: "";
    width: 34px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  /* ===== 画面切り替え ===== */
  .screen {
    display: none;
    position: relative;
    z-index: 1;
    padding: 28px 22px 48px;
    max-width: 860px;
    margin: 0 auto;
    animation: fadeIn 0.4s ease-in-out;
  }
  .active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== ボタンのデザイン ===== */
  button {
    position: relative;
    background: linear-gradient(180deg, #6d5bd0, #4a3aa0);
    color: #fff;
    border: 1px solid rgba(255, 255, 255, 0.25);
    padding: 12px 28px;
    margin: 10px 6px;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    box-shadow: 0 6px 18px rgba(40, 20, 90, 0.55), inset 0 1px 0 rgba(255, 255, 255, 0.25);
    transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
    overflow: hidden;
  }
  button::after {
    content: "";
    position: absolute;
    top: 0; left: -120%;
    width: 60%; height: 100%;
    background: linear-gradient(100deg, transparent, rgba(255,255,255,0.35), transparent);
    transform: skewX(-20deg);
    transition: left 0.5s ease;
  }
  button:hover {
    transform: translateY(-3px);
    filter: brightness(1.08);
    box-shadow: 0 10px 26px rgba(40, 20, 90, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.3);
  }
  button:hover::after { left: 130%; }
  button:active {
    transform: translateY(1px);
    box-shadow: 0 3px 10px rgba(40, 20, 90, 0.5);
  }

  /* ガチャの目玉ボタン */
  .btn-gold {
    background: linear-gradient(180deg, #ffd869, var(--gold) 55%, #d99a1f);
    color: #3a2600;
    border-color: rgba(255, 240, 200, 0.6);
    text-shadow: 0 1px 0 rgba(255, 255, 255, 0.4);
    box-shadow: 0 6px 20px rgba(220, 160, 30, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.5);
  }
  .btn-gold:hover { box-shadow: 0 12px 30px rgba(220, 160, 30, 0.65), inset 0 1px 0 rgba(255, 255, 255, 0.6); }

  /* ===== ガラス質パネル ===== */
  .panel {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 20px;
    padding: 22px;
    margin: 18px auto;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.08);
  }

  .divider {
    height: 1px;
    border: none;
    margin: 24px auto;
    background: linear-gradient(90deg, transparent, var(--panel-border), transparent);
  }

  /* ===== ステータスボックス（バフ・デバフなど） ===== */
  .status-box {
    display: inline-block;
    padding: 5px 12px;
    margin: 3px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    border: 1px solid rgba(255, 255, 255, 0.28);
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.2);
  }
  .status-box.buff { background: linear-gradient(180deg, #4aa3f0, #2f7fd0); }
  .status-box.debuff { background: linear-gradient(180deg, #ef6a5a, #cf3b2c); }
  .status-box.poison { background: linear-gradient(180deg, #a463d6, #7d3fb0); }
  .status-box.damage-up { background: linear-gradient(180deg, #f08a2e, #d05f11); }

  /* ===== カードデザイン ===== */
  .card {
    position: relative;
    width: 128px;
    height: 172px;
    padding: 12px 10px;
    margin: 10px;
    border-radius: 14px;
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 8px 22px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.25);
    transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    border: 1px solid rgba(255, 255, 255, 0.28);
    overflow: hidden;
  }
  /* カード上部の光沢 */
  .card::before {
    content: "";
    position: absolute;
    top: -40%; left: -30%;
    width: 160%; height: 70%;
    background: radial-gradient(ellipse at center, rgba(255,255,255,0.35), transparent 70%);
    pointer-events: none;
  }
  .card:hover {
    transform: translateY(-12px) scale(1.03);
    filter: brightness(1.06);
    box-shadow: 0 16px 34px rgba(0, 0, 0, 0.65), inset 0 1px 0 rgba(255, 255, 255, 0.3);
  }

  /* カード内のテキストレイアウト */
  .card-name {
    position: relative;
    font-size: 15px;
    margin-bottom: 10px;
    padding-bottom: 6px;
    width: 100%;
    border-bottom: 1px solid rgba(255, 255, 255, 0.35);
    text-shadow: 0 1px 3px rgba(0, 0, 0, 0.85);
  }
  .card-desc {
    position: relative;
    font-size: 12px;
    font-weight: 500;
    text-align: center;
    line-height: 1.55;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.85);
  }

  /* カードの種類別カラー */
  .attack  { background: linear-gradient(160deg, #ff6a5a, #c0392b 70%, #8e2018); }
  .heal    { background: linear-gradient(160deg, #4be08a, #22a862 70%, #157a45); }
  .buff    { background: linear-gradient(160deg, #4aa3f0, #2570c8 70%, #1a4f96); }
  .debuff  { background: linear-gradient(160deg, #ffb454, #e67e22 70%, #b85e12); }
  .special { background: linear-gradient(160deg, #c07be6, #8e44ad 70%, #67287f); }

  /* ===== キャラクター選択・所持一覧 ===== */
  .char {
    position: relative;
    border: 1px solid var(--panel-border);
    background: linear-gradient(180deg, rgba(70, 55, 120, 0.5), rgba(35, 25, 65, 0.6));
    margin: 6px;
    padding: 14px 22px;
    border-radius: 14px;
    display: inline-block;
    cursor: pointer;
    font-weight: 700;
    color: var(--ink);
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.12);
    transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
  }
  .char:hover {
    transform: translateY(-4px);
    background: linear-gradient(180deg, rgba(90, 72, 150, 0.6), rgba(45, 33, 80, 0.7));
    box-shadow: 0 8px 22px rgba(0, 0, 0, 0.5);
  }
  .selected {
    border-color: var(--gold);
    background: linear-gradient(180deg, rgba(245, 197, 66, 0.35), rgba(200, 120, 20, 0.4));
    color: #fff8e6;
    box-shadow: 0 0 0 1px var(--gold), 0 8px 24px rgba(245, 197, 66, 0.45);
  }
  .selected::after {
    content: "✔";
    position: absolute;
    top: -8px; right: -8px;
    width: 22px; height: 22px;
    line-height: 22px;
    font-size: 12px;
    border-radius: 50%;
    background: var(--gold);
    color: #3a2600;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
  }

  /* ===== バトル画面のレイアウト ===== */
  .battle-header {
    display: flex;
    justify-content: space-around;
    gap: 16px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    padding: 18px;
    border-radius: 18px;
    margin-bottom: 22px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    box-shadow: var(--shadow);
  }
  .battle-header > div { flex: 1; }
  .hp-text {
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
    color: var(--ink-dim);
  }
  .hp-text span { font-size: 24px; color: var(--ink); }

  .action-point {
    display: inline-block;
    font-size: 16px;
    font-weight: 800;
    color: #3a2600;
    background: linear-gradient(180deg, var(--gold-soft), var(--gold));
    padding: 8px 20px;
    border-radius: 999px;
    margin-bottom: 18px;
    box-shadow: 0 4px 14px rgba(220, 160, 30, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.5);
  }
  #hand {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    min-height: 200px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px dashed rgba(180, 150, 255, 0.25);
    border-radius: 18px;
    padding: 20px 10px;
    margin-bottom: 22px;
  }
  .sc-selected {
    box-shadow: 0 0 0 2px var(--gold), 0 12px 28px rgba(245, 197, 66, 0.6) !important;
    transform: translateY(-12px);
  }

  /* ===== ガチャ演出ステージ ===== */
  .gacha-stage {
    position: relative;
    margin: 20px auto 10px;
    padding: 24px;
    border-radius: 22px;
    background:
      radial-gradient(circle at 50% 0%, rgba(245, 197, 66, 0.18), transparent 60%),
      linear-gradient(180deg, rgba(40, 26, 72, 0.7), rgba(18, 12, 34, 0.75));
    min-height: 200px;
    border: 1px solid var(--panel-border);
    box-shadow: inset 0 0 40px rgba(140, 100, 255, 0.12), var(--shadow);
    overflow: hidden;
  }
  .gacha-title {
    font-size: 19px;
    font-weight: 800;
    letter-spacing: 0.08em;
    margin-bottom: 16px;
    background: linear-gradient(180deg, var(--gold-soft), var(--gold));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 2px 6px rgba(245, 197, 66, 0.3));
  }
  #gachaResults {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 14px;
    min-height: 100px;
  }
  .gacha-item {
    width: 138px;
    min-height: 96px;
    border-radius: 14px;
    padding: 12px;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.04));
    border: 1px solid rgba(255, 255, 255, 0.25);
    box-shadow: 0 6px 16px rgba(0, 0, 0, 0.4);
    animation: popIn 0.4s cubic-bezier(0.22, 1.4, 0.4, 1) both;
  }
  .gacha-item.rarity-N  { border-color: rgba(200, 200, 220, 0.4); }
  .gacha-item.rarity-R  {
    border-color: #4aa3f0;
    box-shadow: 0 0 16px rgba(74, 163, 240, 0.55), 0 6px 16px rgba(0, 0, 0, 0.4);
  }
  .gacha-item.rarity-SR {
    border-color: var(--gold);
    box-shadow: 0 0 24px rgba(245, 197, 66, 0.8), 0 6px 16px rgba(0, 0, 0, 0.4);
    animation: popIn 0.4s cubic-bezier(0.22, 1.4, 0.4, 1) both, srPulse 1.6s ease-in-out infinite;
  }
  .gacha-item-name { font-weight: 800; margin-top: 8px; font-size: 15px; }
  .gacha-item-meta { font-size: 12px; color: var(--ink-dim); margin-top: 2px; }
  .sparkle {
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.9), transparent);
    height: 2px;
    margin: 10px 0;
    animation: shine 1.4s linear infinite;
  }
  @keyframes popIn { from { transform: scale(0.7) translateY(10px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
  @keyframes shine { from { transform: translateX(-130px); } to { transform: translateX(130px); } }
  @keyframes srPulse {
    0%, 100% { box-shadow: 0 0 20px rgba(245, 197, 66, 0.7), 0 6px 16px rgba(0, 0, 0, 0.4); }
    50% { box-shadow: 0 0 34px rgba(245, 197, 66, 1), 0 6px 16px rgba(0, 0, 0, 0.4); }
  }

  .hint { color: var(--ink-dim); font-size: 13px; }

  @media (max-width: 520px) {
    h2 { font-size: 24px; }
    .card { width: 110px; height: 158px; }
    .battle-header { flex-direction: row; }
  }
</style>
</head>
<body>

<div id="gachaScreen" class="screen active">
  <h2>⚔ カードバトル ⚔</h2>

  <div class="panel">
    <div style="font-size:14px; color:var(--ink-dim); margin-bottom:6px;">運命のカードを引き当てよう</div>
    <button class="btn-gold" onclick="drawCharacterUI()">単発ガチャ</button>
    <button class="btn-gold" onclick="draw10UI()">10連ガチャ</button>
  </div>

  <div class="gacha-stage">
    <div class="gacha-title">✨ ガチャ演出 ✨</div>
    <div id="gachaResults">
      <div class="hint">ガチャを引くと結果がここに表示されます。</div>
    </div>
  </div>

  <hr class="divider">

  <h3>所持キャラクター</h3>
  <div id="ownedChars"></div>

  <div id="ownedSC"></div>

  <div style="margin-top: 30px;">
    <button onclick="goSelect()">編成へ進む ➜</button>
  </div>
</div>

<div id="selectScreen" class="screen">
  <h2>パーティ編成</h2>
  <p class="hint">キャラクターを4人選択してください</p>
  <div class="panel">
    <div id="charSelect"></div>
  </div>

  <div class="panel">
    <div id="scSelect"></div>
  </div>

  <div style="margin-top: 20px;">
    <button onclick="goGacha()">◂ ガチャに戻る</button>
    <button class="btn-gold" onclick="startGame()">⚔ 戦闘開始！</button>
  </div>
</div>

<div id="battleScreen" class="screen">

  <div class="battle-header">
    <div>
      <div class="hp-text">🛡 あなた <span id="playerHP"></span></div>
      <div id="playerStatus"></div>
    </div>
    <div>
      <div class="hp-text">👹 敵 <span id="enemyHP"></span></div>
      <div id="enemyStatus"></div>
    </div>
  </div>

  <div class="action-point">残り行動回数: <span id="actionCount"></span></div>

  <div id="hand"></div>

  <div>
    <button class="btn-gold" onclick="nextTurn()">ターン終了 ➜</button>
    <button onclick="goSelect()">撤退する</button>
  </div>

</div>

<script src="main.js"></script>
</body>
</html>
